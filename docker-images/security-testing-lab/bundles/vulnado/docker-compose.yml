version: '3'
services:
  vulnado:
    build: .
    ports:
    - 8080:8080
    links:
    - db
    - internal_site
    environment:
    - PGPASSWORD=vulnado
    - PGDATABASE=vulnado
    - PGHOST=db:5432
    - PGUSER=postgres
    depends_on:
    - db
    image: securitytestinglab/vulnado-vulnado:local
  client:
    build: client
    ports:
    - 1337:80
    image: securitytestinglab/vulnado-client:local
  db:
    image: postgres
    environment:
    - POSTGRES_PASSWORD=vulnado
    - POSTGRES_DB=vulnado
  internal_site:
    build: internal_site
    image: securitytestinglab/vulnado-internal-site:local
