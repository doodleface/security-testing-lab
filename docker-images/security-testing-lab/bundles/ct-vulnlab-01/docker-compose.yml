version: "3.8"

services:
  xvwa:
    image: bitnetsecdave/xvwa:latest
    container_name: ct-vulnlab-xvwa
    restart: unless-stopped
    ports:
      - "18101:80"

  wackopicko:
    image: adamdoupe/wackopicko:latest
    container_name: ct-vulnlab-wackopicko
    restart: unless-stopped
    ports:
      - "18102:80"

  hackazon:
    image: pierrickv/hackazon:latest
    container_name: ct-vulnlab-hackazon
    restart: unless-stopped
    ports:
      - "18103:80"

  headers-static-fixture:
    build: ./fixture-app
    container_name: ct-vulnlab-headers-static
    restart: unless-stopped
    environment:
      FIXTURE_MODE: headers
      FIXTURE_NAME: headers-static-fixture
    ports:
      - "18110:8080"

  auth-jwt-fixture:
    build: ./fixture-app
    container_name: ct-vulnlab-auth-jwt
    restart: unless-stopped
    environment:
      FIXTURE_MODE: auth_jwt
      FIXTURE_NAME: auth-jwt-fixture
    ports:
      - "18111:8080"

  cache-origin:
    build: ./fixture-app
    container_name: ct-vulnlab-cache-origin
    restart: unless-stopped
    environment:
      FIXTURE_MODE: cache_origin
      FIXTURE_NAME: cache-origin-fixture
    expose:
      - "8080"

  cache-varnish:
    image: varnish:7.5-alpine
    container_name: ct-vulnlab-cache-varnish
    restart: unless-stopped
    depends_on:
      - cache-origin
    volumes:
      - ./cache/default.vcl:/etc/varnish/default.vcl:ro
    command: ["varnishd", "-F", "-f", "/etc/varnish/default.vcl", "-a", "0.0.0.0:80", "-s", "malloc,128m"]
    ports:
      - "18112:80"

  waf-fixture:
    build: ./fixture-app
    container_name: ct-vulnlab-waf
    restart: unless-stopped
    environment:
      FIXTURE_MODE: waf
      FIXTURE_NAME: waf-fixture
    ports:
      - "18114:8080"

  soap-wsdl-fixture:
    build: ./fixture-app
    container_name: ct-vulnlab-soap-wsdl
    restart: unless-stopped
    environment:
      FIXTURE_MODE: soap_wsdl
      FIXTURE_NAME: soap-wsdl-fixture
    ports:
      - "18115:8080"

  oob-callback-fixture:
    build: ./fixture-app
    container_name: ct-vulnlab-oob-callback
    restart: unless-stopped
    environment:
      FIXTURE_MODE: oob_callback
      FIXTURE_NAME: oob-callback-fixture
    ports:
      - "18116:8080"

  ai-safety-fixture:
    build: ./fixture-app
    container_name: ct-vulnlab-ai-safety
    restart: unless-stopped
    environment:
      FIXTURE_MODE: ai_safety
      FIXTURE_NAME: ai-safety-fixture
    ports:
      - "18117:8080"
