services:
  dvwa-additional-mysql:
    image: mysql:5.7
    container_name: securitytestinglab-dvwa-additional-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DVWA_ADDITIONAL_DB_ROOT_PASSWORD:?set target-local secret value}
    volumes:
      - ./mysql-init:/docker-entrypoint-initdb.d:ro
      - dvwa_additional_mysql:/var/lib/mysql

  sqli-labs:
    build:
      context: ./sqli-labs
      dockerfile: Dockerfile.securitytestinglab
    image: securitytestinglab/sqli-labs-target:local
    container_name: securitytestinglab-sqli-labs
    restart: unless-stopped
    depends_on:
      - dvwa-additional-mysql
    ports:
      - "0.0.0.0:18150:80"

  owasp-bricks:
    build:
      context: ./owasp-bricks
      dockerfile: Dockerfile.securitytestinglab
    image: securitytestinglab/owasp-bricks-target:local
    container_name: securitytestinglab-owasp-bricks
    restart: unless-stopped
    depends_on:
      - dvwa-additional-mysql
    ports:
      - "0.0.0.0:18151:80"

  peruggia:
    build:
      context: ./peruggia
      dockerfile: Dockerfile.securitytestinglab
    image: securitytestinglab/peruggia-target:local
    container_name: securitytestinglab-peruggia
    restart: unless-stopped
    ports:
      - "0.0.0.0:18152:80"

  upload-labs:
    build:
      context: ./upload-labs
      dockerfile: Dockerfile.securitytestinglab
    image: securitytestinglab/upload-labs-target:local
    container_name: securitytestinglab-upload-labs
    restart: unless-stopped
    ports:
      - "0.0.0.0:18153:80"

  xss-labs:
    build:
      context: ./xss-labs
      dockerfile: Dockerfile.securitytestinglab
    image: securitytestinglab/xss-labs-target:local
    container_name: securitytestinglab-xss-labs
    restart: unless-stopped
    ports:
      - "0.0.0.0:18154:80"

  google-gruyere:
    build:
      context: ./google-gruyere
      dockerfile: Dockerfile.securitytestinglab
    image: securitytestinglab/google-gruyere-target:local
    container_name: securitytestinglab-google-gruyere
    restart: unless-stopped
    ports:
      - "0.0.0.0:18155:8008"

  security-ninjas:
    build:
      context: ./security-ninjas
    image: securitytestinglab/security-ninjas-target:local
    container_name: securitytestinglab-security-ninjas
    restart: unless-stopped
    ports:
      - "0.0.0.0:18156:80"

  bodgeit-store:
    build:
      context: ./bodgeit
      dockerfile: Dockerfile.securitytestinglab
    image: securitytestinglab/bodgeit-target:local
    container_name: securitytestinglab-bodgeit-store
    restart: unless-stopped
    ports:
      - "0.0.0.0:18157:8080"

  altoroj:
    build:
      context: ./altoroj
    image: securitytestinglab/altoroj-target:local
    container_name: securitytestinglab-altoroj
    restart: unless-stopped
    ports:
      - "0.0.0.0:18158:8080"

  vulnado-db:
    image: postgres:12
    container_name: securitytestinglab-vulnado-db
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${VULNADO_POSTGRES_PASSWORD:?set target-local secret value}
      POSTGRES_DB: vulnado

  vulnado-internal-site:
    build:
      context: ./vulnado/internal_site
    image: securitytestinglab/vulnado-internal-site:local
    container_name: securitytestinglab-vulnado-internal-site
    restart: unless-stopped

  vulnado:
    build:
      context: ./vulnado
      dockerfile: Dockerfile.securitytestinglab
    image: securitytestinglab/vulnado-target:local
    container_name: securitytestinglab-vulnado
    restart: unless-stopped
    depends_on:
      - vulnado-db
      - vulnado-internal-site
    environment:
      PGPASSWORD: ${VULNADO_POSTGRES_PASSWORD:?set target-local secret value}
      PGDATABASE: vulnado
      PGHOST: vulnado-db:5432
      PGUSER: postgres
      INTERNAL_SITE: vulnado-internal-site
    ports:
      - "0.0.0.0:18159:8080"

volumes:
  dvwa_additional_mysql: {}
