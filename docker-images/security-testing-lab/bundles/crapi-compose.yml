services:
  crapi-identity:
    container_name: crapi-identity
    image: securitytestinglab/snapshot-crapi-crapi-identity-latest:20260622
    volumes:
    - ./keys:/app/keys
    environment:
    - LOG_LEVEL=${LOG_LEVEL:-INFO}
    - DB_NAME=crapi
    - DB_USER=admin
    - DB_PASSWORD=crapisecretpassword
    - DB_HOST=postgresdb
    - DB_PORT=5432
    - SERVER_PORT=${IDENTITY_SERVER_PORT:-8080}
    - ENABLE_SHELL_INJECTION=${ENABLE_SHELL_INJECTION:-false}
    - JWT_SECRET=crapi
    - MAILHOG_HOST=mailhog
    - MAILHOG_PORT=1025
    - MAILHOG_DOMAIN=example.com
    - SMTP_HOST=smtp.example.com
    - SMTP_PORT=587
    - SMTP_EMAIL=user@example.com
    - SMTP_PASS=xxxxxxxxxxxxxx
    - SMTP_FROM=no-reply@example.com
    - SMTP_AUTH=true
    - SMTP_STARTTLS=true
    - JWT_EXPIRATION=604800000
    - ENABLE_LOG4J=${ENABLE_LOG4J:-false}
    - API_GATEWAY_URL=https://api.mypremiumdealership.com
    - TLS_ENABLED=${TLS_ENABLED:-false}
    - TLS_KEYSTORE_TYPE=PKCS12
    - TLS_KEYSTORE=classpath:certs/server.p12
    - TLS_KEYSTORE_PASSWORD=passw0rd
    - TLS_KEY_PASSWORD=passw0rd
    - TLS_KEY_ALIAS=identity
    depends_on:
      postgresdb:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      mailhog:
        condition: service_healthy
    healthcheck:
      test: /app/health.sh
      interval: 15s
      timeout: 15s
      retries: 15
    deploy:
      resources:
        limits:
          cpus: '0.8'
          memory: 384M
    build:
      context: ./external-images/snapshot-crapi-crapi-identity-latest
  crapi-community:
    container_name: crapi-community
    image: securitytestinglab/snapshot-crapi-crapi-community-latest:20260622
    environment:
    - LOG_LEVEL=${LOG_LEVEL:-INFO}
    - IDENTITY_SERVICE=crapi-identity:${IDENTITY_SERVER_PORT:-8080}
    - DB_NAME=crapi
    - DB_USER=admin
    - DB_PASSWORD=crapisecretpassword
    - DB_HOST=postgresdb
    - DB_PORT=5432
    - SERVER_PORT=${COMMUNITY_SERVER_PORT:-8087}
    - MONGO_DB_HOST=mongodb
    - MONGO_DB_PORT=27017
    - MONGO_DB_USER=admin
    - MONGO_DB_PASSWORD=crapisecretpassword
    - MONGO_DB_NAME=crapi
    - TLS_ENABLED=${TLS_ENABLED:-false}
    - TLS_CERTIFICATE=certs/server.crt
    - TLS_KEY=certs/server.key
    depends_on:
      postgresdb:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      crapi-identity:
        condition: service_healthy
    healthcheck:
      test: /app/health.sh
      interval: 15s
      timeout: 15s
      retries: 15
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 192M
    build:
      context: ./external-images/snapshot-crapi-crapi-community-latest
  crapi-workshop:
    container_name: crapi-workshop
    image: securitytestinglab/snapshot-crapi-crapi-workshop-latest:20260622
    environment:
    - LOG_LEVEL=${LOG_LEVEL:-INFO}
    - IDENTITY_SERVICE=crapi-identity:${IDENTITY_SERVER_PORT:-8080}
    - DB_NAME=crapi
    - DB_USER=admin
    - DB_PASSWORD=crapisecretpassword
    - DB_HOST=postgresdb
    - DB_PORT=5432
    - SERVER_PORT=${WORKSHOP_SERVER_PORT:-8000}
    - MONGO_DB_HOST=mongodb
    - MONGO_DB_PORT=27017
    - MONGO_DB_USER=admin
    - MONGO_DB_PASSWORD=crapisecretpassword
    - MONGO_DB_NAME=crapi
    - SECRET_KEY=crapi
    - API_GATEWAY_URL=https://api.mypremiumdealership.com
    - TLS_ENABLED=${TLS_ENABLED:-false}
    - TLS_CERTIFICATE=certs/server.crt
    - TLS_KEY=certs/server.key
    - FILES_LIMIT=1000
    depends_on:
      postgresdb:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      crapi-identity:
        condition: service_healthy
      crapi-community:
        condition: service_healthy
    healthcheck:
      test: /app/health.sh
      interval: 15s
      timeout: 15s
      retries: 15
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 128M
    build:
      context: ./external-images/snapshot-crapi-crapi-workshop-latest
  crapi-chatbot:
    container_name: crapi-chatbot
    image: securitytestinglab/snapshot-crapi-crapi-chatbot-latest:20260622
    environment:
    - TLS_ENABLED=${TLS_ENABLED:-false}
    - SERVER_PORT=${CHATBOT_SERVER_PORT:-5002}
    - WEB_SERVICE=crapi-web
    - IDENTITY_SERVICE=crapi-identity:${IDENTITY_SERVER_PORT:-8080}
    - DB_NAME=crapi
    - DB_USER=admin
    - DB_PASSWORD=crapisecretpassword
    - DB_HOST=postgresdb
    - DB_PORT=5432
    - MONGO_DB_HOST=mongodb
    - MONGO_DB_PORT=27017
    - MONGO_DB_USER=admin
    - MONGO_DB_PASSWORD=crapisecretpassword
    - MONGO_DB_NAME=crapi
    - API_USER=admin@example.com
    - API_PASSWORD=Admin!123
    - OPENAPI_SPEC=/app/resources/crapi-openapi-spec.json
    - DEFAULT_MODEL=gpt-4o-mini
    - CHROMA_HOST=chromadb
    - CHROMA_PORT=8000
    depends_on:
      mongodb:
        condition: service_healthy
      crapi-identity:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    build:
      context: ./external-images/snapshot-crapi-crapi-chatbot-latest
  crapi-web:
    container_name: crapi-web
    image: securitytestinglab/snapshot-crapi-crapi-web-latest:20260622
    ports:
    - ${LISTEN_IP:-127.0.0.1}:8888:80
    - ${LISTEN_IP:-127.0.0.1}:30080:80
    - ${LISTEN_IP:-127.0.0.1}:8443:443
    - ${LISTEN_IP:-127.0.0.1}:30443:443
    environment:
    - COMMUNITY_SERVICE=crapi-community:${COMMUNITY_SERVER_PORT:-8087}
    - IDENTITY_SERVICE=crapi-identity:${IDENTITY_SERVER_PORT:-8080}
    - WORKSHOP_SERVICE=crapi-workshop:${WORKSHOP_SERVER_PORT:-8000}
    - CHATBOT_SERVICE=crapi-chatbot:${CHATBOT_SERVER_PORT:-5002}
    - MAILHOG_WEB_SERVICE=mailhog:8025
    - TLS_ENABLED=${TLS_ENABLED:-false}
    depends_on:
      crapi-community:
        condition: service_healthy
      crapi-identity:
        condition: service_healthy
      crapi-workshop:
        condition: service_healthy
    healthcheck:
      test: curl 0.0.0.0:80/health
      interval: 15s
      timeout: 15s
      retries: 15
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 128M
    build:
      context: ./external-images/snapshot-crapi-crapi-web-latest
  postgresdb:
    container_name: postgresdb
    image: securitytestinglab/snapshot-postgres-14:20260622
    command:
    - postgres
    - -c
    - max_connections=500
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: crapisecretpassword
      POSTGRES_DB: crapi
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready
      interval: 15s
      timeout: 15s
      retries: 15
    volumes:
    - postgresql-data:/var/lib/postgresql/data/
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    build:
      context: ./external-images/snapshot-postgres-14
  mongodb:
    container_name: mongodb
    image: securitytestinglab/snapshot-mongo-4-4:20260622
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: crapisecretpassword
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongo mongodb:27017/test --quiet
      interval: 15s
      timeout: 15s
      retries: 15
      start_period: 20s
    volumes:
    - mongodb-data:/data/db
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 128M
    build:
      context: ./external-images/snapshot-mongo-4-4
  chromadb:
    container_name: chromadb
    image: securitytestinglab/snapshot-chromadb-chroma-latest:20260622
    environment:
      IS_PERSISTENT: 'TRUE'
    healthcheck:
      test:
      - CMD
      - /bin/bash
      - -c
      - cat < /dev/null > /dev/tcp/localhost/8000
      interval: 15s
      timeout: 15s
      retries: 15
      start_period: 20s
    volumes:
    - chromadb-data:/data
    build:
      context: ./external-images/snapshot-chromadb-chroma-latest
  mailhog:
    user: root
    container_name: mailhog
    image: securitytestinglab/snapshot-crapi-mailhog-latest:20260622
    environment:
      MH_MONGO_URI: admin:crapisecretpassword@mongodb:27017
      MH_STORAGE: mongodb
    ports:
    - ${LISTEN_IP:-127.0.0.1}:8025:8025
    healthcheck:
      test:
      - CMD
      - nc
      - -z
      - localhost
      - '8025'
      interval: 15s
      timeout: 15s
      retries: 15
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 128M
    build:
      context: ./external-images/snapshot-crapi-mailhog-latest
  api.mypremiumdealership.com:
    container_name: api.mypremiumdealership.com
    image: securitytestinglab/snapshot-crapi-gateway-service-latest:20260622
    healthcheck:
      test: bash -c 'echo -n "GET / HTTP/1.1\n\n" > /dev/tcp/127.0.0.1/443'
      interval: 15s
      timeout: 15s
      retries: 15
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 50M
    build:
      context: ./external-images/snapshot-crapi-gateway-service-latest
volumes:
  mongodb-data: null
  postgresql-data: null
  chromadb-data: null
