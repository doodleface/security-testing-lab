services:
  securitytestinglab-roundcube-webmail-lab:
    build:
      context: ./roundcube-webmail-lab
    image: securitytestinglab/roundcube-webmail-lab:local
    container_name: securitytestinglab-roundcube-webmail-lab
    restart: unless-stopped
    ports:
      - "0.0.0.0:18206:8080"
    labels:
      securitytestinglab.app_id: "roundcube-webmail-lab"
      securitytestinglab.coverage: "Webmail, MIME preview, address-book, attachment, and mail-auth flow coverage"
