services:
  juice-shop:
    image: bkimminich/juice-shop
    container_name: securitytestinglab-juice-shop
    restart: unless-stopped
    ports:
      - "${JUICE_SHOP_BIND_HOST:-0.0.0.0}:${JUICE_SHOP_PORT:-3000}:3000"

  vampi:
    image: erev0s/vampi:latest
    container_name: securitytestinglab-vampi
    restart: unless-stopped
    environment:
      vulnerable: "${VAMPI_VULNERABLE:-1}"
      tokentimetolive: "${VAMPI_TOKEN_TTL:-3600}"
    ports:
      - "${VAMPI_BIND_HOST:-0.0.0.0}:${VAMPI_PORT:-5000}:5000"
